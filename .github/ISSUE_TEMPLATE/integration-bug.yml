name: Integration Bug
about: Report a bug in TSF++ integration assets (ESLint config, tsconfig, workflow, IDE bindings).
title: "integration: bug <component>"
labels:
  - integration
  - bug
body:
  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      options:
        - @tsfpp/eslint-config
        - @tsfpp/tsconfig
        - GitHub workflow files
        - GitHub Copilot integration
        - Other integration asset
    validations:
      required: true

  - type: textarea
    id: version_info
    attributes:
      label: Version Information
      description: Include package versions, Node version, TypeScript version, and ESLint version where relevant.
      placeholder: "@tsfpp/eslint-config 1.0.0, eslint 9.x, typescript 5.x, node 20"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: error_output
    attributes:
      label: Error Output
      description: Paste exact errors if available.
      render: shell

  - type: textarea
    id: repro
    attributes:
      label: Minimal Reproduction
      description: Minimal reproducible setup or repository.
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I tested against the latest published version.
          required: true
        - label: I searched existing issues before filing this report.
          required: true
